# ========================
# SERVER CONFIG
# ========================
server.port=8080
server.servlet.context-path=/api

# ========================
# DATABASE - MySQL (nh? thay l?i password thąnh pw cu? my SQL nhe)
# ========================
spring.datasource.url=jdbc:mysql://localhost:3306/device_maintenance_db?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.default_schema=device_maintenance_db

# ========================
# JWT
# ========================
app.jwt.secret=DeviceMaintenanceSystemSecretKey2024VeryLongSecretForHS512Algorithm!@#
app.jwt.expiration=86400000
app.jwt.refresh-expiration=604800000

# ========================
# FILE UPLOAD
# ========================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB
app.upload.dir=./uploads
app.upload.base-url=http://localhost:8080/api

# ========================
# MAIL (Gmail SMTP)
# ========================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your_email@gmail.com
spring.mail.password=your_app_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.from=your_email@gmail.com

# ========================
# SWAGGER
# ========================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# ========================
# LOGGING
# ========================
logging.level.com.maintenance=DEBUG
logging.level.org.springframework.security=INFO
